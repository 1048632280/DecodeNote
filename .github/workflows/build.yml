name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Generate icons from source PNG
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build Tauri app
        run: npx tauri build --bundles nsis,msi

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: DecodeNote-Windows-MSI
          path: src-tauri\target\release\bundle\msi\*.msi

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: DecodeNote-Windows-NSIS
          path: src-tauri\target\release\bundle\nsis\*.exe

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: DecodeNote-Windows-Portable
          path: |
            src-tauri\target\release\bundle\nsis\*.exe
            src-tauri\target\release\*.exe
